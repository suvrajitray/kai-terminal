<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Deep glossy radial background specifically engineered for premium app icons -->
    <radialGradient id="bgGrad" cx="50%" cy="20%" r="80%" fx="50%" fy="20%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>
    
    <!-- Bold Tech Purple-to-Blue sweep for the terminal prompt -->
    <linearGradient id="promptGrad" x1="125" y1="136" x2="245" y2="376" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Bullish glowing neon green for the trading candle -->
    <linearGradient id="candleGrad" x1="353" y1="100" x2="353" y2="412" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>

    <!-- Subtle soft shadow to give depth to the geometric elements -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- iOS-style Squircle background -->
  <rect width="512" height="512" rx="115" fill="url(#bgGrad)" />
  <!-- Sleek interior gloss border -->
  <rect x="24" y="24" width="464" height="464" rx="91" fill="none" stroke="#334155" stroke-width="4" opacity="0.5" />

  <g filter="url(#shadow)">
    <!-- The Terminal Shape (Left - Mathematically balanced) -->
    <path d="M 125 136 L 245 256 L 125 376" fill="none" stroke="url(#promptGrad)" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" />

    <!-- The Trading Shape (Right - Proportionally refined) -->
    <path d="M 353 100 L 353.1 412" fill="none" stroke="url(#candleGrad)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
    <rect x="297" y="176" width="112" height="160" rx="32" fill="url(#candleGrad)" />
  </g>
</svg>
