<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
  </defs>
  
  <!-- Sleek dark background with rounded corners -->
  <rect width="512" height="512" rx="120" fill="url(#bgGrad)" />
  
  <!-- Outer glowing stroke (subtle) -->
  <rect x="16" y="16" width="480" height="480" rx="104" fill="none" stroke="#1e293b" stroke-width="8" />
  
  <!-- The 'K' combined with a terminal prompt -->
  <g transform="translate(130, 140)">
    <!-- Vertical line of K -->
    <path d="M 40 20 L 40 220" stroke="url(#accentGrad)" stroke-width="45" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Top arm of K -->
    <path d="M 40 120 L 140 20" stroke="url(#accentGrad)" stroke-width="45" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Bottom arm of K -->
    <path d="M 40 120 L 140 220" stroke="url(#accentGrad)" stroke-width="45" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    
    <!-- Terminal Underscore/Cursor in bright green -->
    <path d="M 170 220 L 250 220" stroke="url(#greenGrad)" stroke-width="45" stroke-linecap="round" fill="none" />
  </g>
</svg>
