<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background -->
    <radialGradient id="bgGrad" cx="50%" cy="20%" r="80%" fx="50%" fy="20%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>
    
    <!-- Prompt Gradient -->
    <linearGradient id="promptGrad" x1="90" y1="156" x2="190" y2="356" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Bearish Red Candle Gradient -->
    <linearGradient id="bearGrad" x1="270" y1="160" x2="270" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fb7185" />
      <stop offset="100%" stop-color="#e11d48" />
    </linearGradient>

    <!-- Bullish Green Candle Gradient -->
    <linearGradient id="bullGrad" x1="390" y1="80" x2="390" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- iOS-style Squircle background -->
  <rect width="512" height="512" rx="115" fill="url(#bgGrad)" />
  <rect x="24" y="24" width="464" height="464" rx="91" fill="none" stroke="#334155" stroke-width="4" opacity="0.5" />

  <g filter="url(#shadow)">
    <!-- Terminal Shape (Scaled down slightly) -->
    <path d="M 90 156 L 190 256 L 90 356" fill="none" stroke="url(#promptGrad)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Small Bearish Candle -->
    <path d="M 270 160 L 270.1 380" fill="none" stroke="url(#bearGrad)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
    <rect x="234" y="220" width="72" height="120" rx="20" fill="url(#bearGrad)" />

    <!-- Huge Bullish Candle -->
    <path d="M 390 80 L 390.1 340" fill="none" stroke="url(#bullGrad)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
    <rect x="354" y="120" width="72" height="180" rx="20" fill="url(#bullGrad)" />
  </g>
</svg>
