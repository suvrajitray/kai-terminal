# KAI Terminal — Nginx site configuration
# Primary domain: kaiterminal.com
# kaiterminal.in redirects to kaiterminal.com (301)

# ── Redirect all HTTP → HTTPS (both domains) ──────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name kaiterminal.com kaiterminal.in;
    return 301 https://kaiterminal.com$request_uri;
}

# ── kaiterminal.in HTTPS → redirect to kaiterminal.com ────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name kaiterminal.in;

    ssl_certificate     /etc/letsencrypt/live/kaiterminal.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kaiterminal.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://kaiterminal.com$request_uri;
}

# ── kaiterminal.com — main app ─────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name kaiterminal.com;

    ssl_certificate     /etc/letsencrypt/live/kaiterminal.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kaiterminal.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    # Gzip static assets
    gzip            on;
    gzip_vary       on;
    gzip_types      text/plain text/css application/javascript application/json
                    image/svg+xml application/wasm;
    gzip_min_length 1000;

    # Frontend — React SPA (Vite build output)
    root  /var/www/kaiterminal;
    index index.html;

    # SPA fallback — all non-asset routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store";
    }

    # Vite hashed assets — immutable, cache 1 year
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Google OAuth callback — ASP.NET Core middleware default path
    location /signin-google {
        proxy_pass         http://localhost:5001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # API + Auth + Scalar proxy → internal ASP.NET Core (HTTP)
    location ~ ^/(api|auth|scalar)/ {
        proxy_pass         http://localhost:5001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }

    # SignalR hubs — WebSocket upgrade required
    location /hubs/ {
        proxy_pass         http://localhost:5001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;  # 24h — keep SignalR connections alive
        proxy_buffering    off;
    }
}
